version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  # The voxel toolkit's Python deps (numpy, Pillow) declared in tools/requirements.txt.
  - package-ecosystem: pip
    directory: "/tools"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python
